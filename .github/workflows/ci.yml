name: ci

on:
  pull_request:
  push:
    branches:
      - "main"
      - "dev"
      - "feature/**"
    tags-ignore:
      - "*"

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.mod

      - name: Build backend
        working-directory: backend
        env:
          GOSUMDB: "off"
          CGO_ENABLED: "0"
        run: |
          go mod download
          go build -trimpath -ldflags="-s -w" -o /tmp/QMediaSync .
