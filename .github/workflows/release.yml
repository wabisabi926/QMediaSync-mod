name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"

  frontend:
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Include standalone backend assets
        run: |
          mkdir -p backend/web_statics
          cp backend/assets/db_config.html backend/web_statics/

      - uses: actions/upload-artifact@v4
        with:
          name: web-statics
          path: backend/web_statics
          if-no-files-found: error

  packages:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - frontend
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: QMediaSync.exe
          - goos: windows
            goarch: arm64
            binary: QMediaSync.exe
          - goos: linux
            goarch: amd64
            binary: QMediaSync
          - goos: linux
            goarch: arm64
            binary: QMediaSync
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.mod

      - uses: actions/download-artifact@v4
        with:
          name: web-statics
          path: backend/web_statics

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOSUMDB: "off"
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ needs.metadata.outputs.tag }}
          BUILD_DATE: ${{ needs.metadata.outputs.build_date }}
          FANART_API_KEY: ${{ secrets.FANART_API_KEY }}
          DEFAULT_TMDB_ACCESS_TOKEN: ${{ secrets.DEFAULT_TMDB_ACCESS_TOKEN }}
          DEFAULT_TMDB_API_KEY: ${{ secrets.DEFAULT_TMDB_API_KEY }}
          DEFAULT_SC_API_KEY: ${{ secrets.DEFAULT_SC_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          mkdir -p dist release-assets linux-binaries

          extra_ldflags=""
          if [ "$GOOS" = "windows" ]; then
            extra_ldflags="-H=windowsgui "
          fi

          ldflags="${extra_ldflags}-s -w -X main.Version=${TAG} -X 'main.PublishDate=${BUILD_DATE}' -X main.FANART_API_KEY=${FANART_API_KEY} -X main.DEFAULT_TMDB_ACCESS_TOKEN=${DEFAULT_TMDB_ACCESS_TOKEN} -X main.DEFAULT_TMDB_API_KEY=${DEFAULT_TMDB_API_KEY} -X main.DEFAULT_SC_API_KEY=${DEFAULT_SC_API_KEY} -X main.ENCRYPTION_KEY=${ENCRYPTION_KEY}"
          output="dist/QMediaSync_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            output="${output}.exe"
          fi

          cd backend
          go mod download
          go build -trimpath -ldflags "$ldflags" -o "$GITHUB_WORKSPACE/$output" .
          cd "$GITHUB_WORKSPACE"

          .github/scripts/package-release-asset.sh "$TAG" "$GOOS" "$GOARCH" "$output" backend/web_statics release-assets

          if [ "$GOOS" = "linux" ]; then
            cp "$output" "linux-binaries/QMediaSync_linux_${GOARCH}_exe"
            chmod +x "linux-binaries/QMediaSync_linux_${GOARCH}_exe"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release-assets/*
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: matrix.goos == 'linux'
        with:
          name: linux-binary-${{ matrix.goarch }}
          path: linux-binaries/QMediaSync_linux_${{ matrix.goarch }}_exe
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - frontend
      - packages
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: web-statics
          path: docker-context/backend/web_statics

      - uses: actions/download-artifact@v4
        with:
          name: linux-binary-amd64
          path: docker-context/temp_build

      - uses: actions/download-artifact@v4
        with:
          name: linux-binary-arm64
          path: docker-context/temp_build

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/backend/scripts docker-context/backend/assets
          cp Dockerfile_local docker-context/Dockerfile_local
          cp backend/scripts/docker-entrypoint.sh docker-context/backend/scripts/
          cp backend/scripts/watch_update.sh docker-context/backend/scripts/
          cp backend/assets/db_config.html docker-context/backend/assets/
          cp backend/icon.ico docker-context/backend/icon.ico

      - name: Check Docker credentials
        id: docker_credentials
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker credentials are not set, skipping image publish"
          fi

      - name: Set up QEMU
        if: steps.docker_credentials.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.docker_credentials.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: steps.docker_credentials.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: steps.docker_credentials.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile_local
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/qmediasync:${{ needs.metadata.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/qmediasync:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fpk:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - frontend
      - packages
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: web-statics
          path: backend/web_statics

      - uses: actions/download-artifact@v4
        with:
          name: linux-binary-amd64
          path: temp_build

      - uses: actions/download-artifact@v4
        with:
          name: linux-binary-arm64
          path: temp_build

      - name: Install fnpack from URL
        env:
          FNPACK_DOWNLOAD_URL: ${{ secrets.FNPACK_DOWNLOAD_URL }}
        run: |
          if [ -z "$FNPACK_DOWNLOAD_URL" ]; then
            echo "FNPACK_DOWNLOAD_URL is not set, fnpack installation skipped"
            exit 0
          fi
          curl -fsSL "$FNPACK_DOWNLOAD_URL" -o /tmp/fnpack
          chmod +x /tmp/fnpack
          sudo mv /tmp/fnpack /usr/local/bin/fnpack

      - name: Build FNOS packages
        env:
          TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          mkdir -p release-assets
          .github/scripts/package-fnos.sh "$TAG" amd64 temp_build/QMediaSync_linux_amd64_exe backend/web_statics release-assets
          .github/scripts/package-fnos.sh "$TAG" arm64 temp_build/QMediaSync_linux_arm64_exe backend/web_statics release-assets

      - uses: actions/upload-artifact@v4
        with:
          name: fpk-assets
          path: release-assets/*.fpk
          if-no-files-found: ignore

  github-release:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - packages
      - fpk
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          path: release-assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: fpk-assets
          path: release-assets

      - name: Prepare release notes
        env:
          TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          if [ -f ".changes/${TAG}.md" ]; then
            cp ".changes/${TAG}.md" release_notes.md
          else
            echo "Release ${TAG}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: Release ${{ needs.metadata.outputs.tag }}
          body_path: release_notes.md
          files: release-assets/*
          fail_on_unmatched_files: false

      - name: Publish Gitee Release
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_REPO: qicfan/qmediasync
        run: |
          .github/scripts/publish-gitee-release.sh "${{ needs.metadata.outputs.tag }}" release_notes.md release-assets/*

      - name: Send release notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MEOW_API_URL: ${{ secrets.MEOW_API_URL }}
        run: |
          .github/scripts/notify-release.sh "${{ needs.metadata.outputs.tag }}" release_notes.md
