name: feature-build

on:
  push:
    branches:
      - "feature/**"
    tags-ignore:
      - "*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract branch name
        id: branch
        run: |
          raw="${GITHUB_REF_NAME#feature/}"
          tag="${raw//\//-}"
          tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//')"
          tag="${tag:0:120}"
          if [ -z "$tag" ]; then
            tag="feature"
          fi
          echo "name=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build metadata
        id: meta
        run: |
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME}.${build_date}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qmediasync:${{ steps.branch.outputs.name }}
          file: docker/source.Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            FANART_API_KEY=${{ secrets.FANART_API_KEY }}
            TMDB_ACCESS_TOKEN=${{ secrets.TMDB_ACCESS_TOKEN }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            SC_API_KEY=${{ secrets.SC_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
