name: beta
run-name: ${{ github.event.head_commit.message || github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "dev"
    tags-ignore:
      - "*"

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build metadata
        id: meta
        run: |
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME}.${build_date}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qmediasync:beta
          file: docker/source.Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
